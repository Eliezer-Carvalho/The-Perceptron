<!DOCTYPE html>

<html lang = "pt">

<head>

  <meta charset = "UTF-8">
  
  <link rel = "stylesheet" href = "style.css">
  <link rel = "shortcut icon" href = "Favicon/favicon-32x32.png">
  
</head>


<body>

<div class = layout>

    <img class = "NeuroFlap" src = "NeuroFlap.png">

    <a href = "https://github.com/Eliezer-Carvalho/Neuro-Flap" target = "_blank"> 
      <img class = "GitLogo" src = "github-seeklogo.png" alt = "GitHub">
    </a>

    <a href = "https://www.linkedin.com/in/eliezer-carvalho-332803225/" target = "_blank">
      <img class = "LinkedinLogo" src = "icons8-linkedin-logo-64.png" alt = "Linkedin"> 
    </a>

</div>

<div class = content>

  <canvas id = "canvas"> </canvas>

  <script>
    var Module = {
      canvas: document.getElementById("canvas")
    };

    let gameStarted_PC = false;

    document.addEventListener("click", () => {
      if (gameStarted_PC == false) {
        Module._GAME_ON();
        gameStarted_PC = true;
      } else {
        Module._JUMP();
      }
    });

    let gameStarted_MOBILE = false;

    document.canvas.addEventListener("touchstart", () => {
      if (gameStarted_MOBILE == false) {
        Module._GAME_ON();
        gameStarted_MOBILE = true;
      } else {
        Module._JUMP();
      }    
    });


  </script>
</div>

<div class = footer> 
  <p> &copy; Eliezer Carvalho | All Rights Reserved | April 2026 </p>

</div>

<script src = "index.js"> </script>
</body>


</html>
