<!DOCTYPE html>

<html lang = "pt">

<head>

  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
  <link rel = "stylesheet" href = "style.css">
  <link rel = "shortcut icon" href = "Favicon/favicon-32x32.png">
  
</head>


<body>

<div class = layout>

    <img class = "NeuroFlap" src = "NeuroFlap.png">

    <a href = "https://github.com/Eliezer-Carvalho/Neuro-Flap" target = "_blank"> 
      <img class = "GitLogo" src = "github-seeklogo.png" alt = "GitHub">
    </a>

    <a href = "https://www.linkedin.com/in/eliezer-carvalho-332803225/" target = "_blank">
      <img class = "LinkedinLogo" src = "icons8-linkedin-logo-64.png" alt = "Linkedin"> 
    </a>

</div>

<div class = content>

  <canvas id = "canvas"> </canvas>

  <script>
    var Module = {
      canvas: document.getElementById("canvas")
    };

    let gameStarted = false;
    const canvas = document.querySelector("canvas");

    canvas.addEventListener("pointerdown", (e) => { //pointerdown funciona com toque para PC, CANETA e TOUCH GOAT STUFF
      e.preventDefault(); //Previne começar com qualquer toque fora do canvas

      if (!gameStarted) {
        Module._GAME_ON();
        gameStarted = true;
      } else {
        Module._JUMP();
      }
    });

  </script>
</div>

</div>

<script src = "index.js"> </script>

</html>
